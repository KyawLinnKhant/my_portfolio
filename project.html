<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Kyaw Linn Khant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ════════════════════════════════════════════════
   Kyaw Linn Khant — Portfolio Stylesheet
   Theme: Deep Blue + Electric Blue accent
   Fonts: Space Grotesk · Inter
════════════════════════════════════════════════ */

:root {
  --bg0:     #060810;
  --bg1:     #08101e;
  --bg2:     #0c1628;
  --surface: rgba(255,255,255,.03);
  --border:  rgba(255,255,255,.07);
  --text:    #c8d8f0;
  --muted:   #4a6080;
  --blue:    #3b82f6;
  --blue-lo: rgba(59,130,246,.1);
  --blue-hi: rgba(59,130,246,.5);
  --sky:     #7dd3fc;
  --indigo:  #818cf8;

  /* skill category palette */
  --c-lang:   #7dd3fc;
  --c-ai:     #a78bfa;
  --c-robot:  #34d399;
  --c-embed:  #fb923c;
  --c-sim:    #f472b6;
  --c-devops: #60a5fa;
  --c-design: #c084fc;
  --c-soft:   #94a3b8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { scroll-padding-top: 114px }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  color: var(--text);
  background-color: var(--bg0);
  background-image:
    radial-gradient(ellipse 800px 600px at 10%  0%,  rgba(59,130,246,.07), transparent),
    radial-gradient(ellipse 700px 500px at 90% 20%, rgba(125,211,252,.04), transparent),
    radial-gradient(ellipse 900px 700px at 50% 95%, rgba(129,140,248,.04), transparent);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px }

/* Section spacing */
section { padding: 0 }
section[id] { scroll-margin-top: 120px }

/* Divider line between sections — skip hero */
section[id] {
  border-top: 1px solid rgba(59,130,246,.12);
}

/* h2 title: breathing room below divider */
section[id] > h2 {
  padding-top: 60px;
  margin-bottom: 32px;
}

/* Content bottom margin: gap before next divider */
section[id] > .card,
section[id] > .skills-grid,
section[id] > .grid {
  margin-bottom: 60px;
}

/* Projects section: grid + button together */
section[id] > #projects-grid {
  margin-bottom: 24px;
}
section[id] > .center {
  margin-bottom: 60px;
}

h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(20px, 2.4vw, 26px);
  font-weight: 700;
  letter-spacing: -.02em;
  text-align: center;
  margin: 0 0 32px;
  color: #e8f0ff;
}
h2 .accent { color: var(--blue) }

/* ─── NAV ─────────────────────────────────────── */
.navwrap {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,8,16,.92);
  backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid rgba(59,130,246,.1);
}
.nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 8px 0 }

.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 15px;
  white-space: nowrap; letter-spacing: -.01em;
  color: #e8f0ff;
}

.links {
  display: flex; align-items: center; gap: 5px;
  background: #020408;
  padding: 6px; border-radius: 8px;
  height: 94px; overflow: hidden;
}
.links input[type="radio"] { display: none }

.nav-label {
  width: 70px; height: 80px;
  background: #0c1428;
  border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 8px 6px;
  border-top: 1px solid #162040;
  transition: all .1s linear;
  position: relative; z-index: 2;
  cursor: pointer;
}
.nav-label .back-side {
  position: absolute; top: -10px; left: 0;
  background: #0c1428;
  border-radius: 4px 4px 2px 2px;
  width: 100%; height: 14px;
  box-shadow: inset 0 5px 3px 1px rgba(0,0,0,.6), inset 0 -5px 2px 0 rgba(59,130,246,.12);
  transform: perspective(300px) rotateX(50deg);
  z-index: 1; opacity: 0;
  transition: all .1s linear;
}
.nav-label .key-text {
  color: #1e3060; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  text-align: center; line-height: 1.2;
  transition: all .1s linear;
}
.nav-label .bottom-line {
  width: 100%; height: 4px; border-radius: 999px;
  background: #0c1428;
  box-shadow: 0 0 3px 0 #000;
  border-top: 1px solid #162040;
  transition: all .1s linear;
}
.nav-label:has(input:checked) .back-side,
.nav-label.active             .back-side,
.nav-label:hover               .back-side { opacity: 1 }
.nav-label:has(input:checked),
.nav-label.active,
.nav-label:hover {
  transform: perspective(200px) rotateX(-18deg);
  transform-origin: 50% 40%;
  box-shadow: inset 0 -20px 15px 0 rgba(0,0,0,.6);
  border-top: 1px solid rgba(59,130,246,.5);
  margin-top: 6px; border-radius: 0 0 4px 4px;
}
.nav-label:has(input:checked) .key-text,
.nav-label.active             .key-text,
.nav-label:hover               .key-text {
  color: var(--sky);
  text-shadow: 0 0 10px rgba(125,211,252,.8), 1px 1px 2px #000;
}
.nav-label:has(input:checked) .bottom-line,
.nav-label.active             .bottom-line,
.nav-label:hover               .bottom-line {
  background: #04080f;
  border-top-color: rgba(59,130,246,.3);
}

.hamburger { display: none; background: none; border: 0; font-size: 22px; color: #fff; cursor: pointer }
@media(max-width:900px) {
  .hamburger { display: block }
  .links {
    display: none; flex-direction: row; flex-wrap: wrap;
    position: absolute; right: 16px; top: 66px;
    background: #020408; padding: 8px; border-radius: 8px;
    border: 1px solid rgba(59,130,246,.15);
    height: auto; overflow: visible;
  }
  .links.open { display: flex }
  .nav-label { width: 62px; height: 68px }
  .nav-label .key-text { font-size: 9px }
}

/* ─── HERO ────────────────────────────────────── */
.hero {
  display: flex; align-items: center; gap: 40px;
  flex-wrap: wrap;
}
.hero-text { flex: 1; min-width: 260px }

.name-row {
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap; margin-bottom: 10px;
}

.pfp {
  width: 90px; height: 90px; border-radius: 50%; flex-shrink: 0;
  object-fit: cover;
  border: 2px solid rgba(59,130,246,.35);
  box-shadow: 0 0 40px rgba(59,130,246,.12);
  background: linear-gradient(135deg, #0c1428, #121e3a);
}

.hero-text h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(32px, 5.5vw, 54px);
  font-weight: 700; line-height: 1.0;
  letter-spacing: -.03em;
  color: #e8f0ff;
  white-space: nowrap;
}
.hero-text h1 em {
  font-style: normal;
  background: linear-gradient(95deg, var(--blue) 0%, var(--sky) 55%, var(--indigo) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.tagline {
  color: var(--muted); font-size: 15px; font-weight: 400;
  margin: 10px 0 24px; letter-spacing: .01em;
}
.cta { display: flex; gap: 14px; flex-wrap: wrap }

/* Hero keeps its own spacing */
.hero { padding: 72px 0 48px }
.loader-wrap { flex-shrink: 0; line-height: 0; margin-right: 32px }
.loader {
  width: 100px; height: 116px;
  position: relative;
  background: #e8edf8;
  border-radius: 62px 62px 0 0;
}
.loader::after {
  content: "";
  position: absolute;
  width: 62px; height: 78px;
  left: 50%; top: 16px;
  transform: translateX(-50%);
  background-image:
    radial-gradient(circle, #000 48%, transparent 55%),
    radial-gradient(circle, #000 48%, transparent 55%),
    radial-gradient(circle, #fff 30%, transparent 45%),
    radial-gradient(circle, #000 48%, transparent 51%),
    linear-gradient(#000 20px, transparent 0),
    linear-gradient(#cfecf9 60px, transparent 0),
    radial-gradient(circle, #cfecf9 50%, transparent 51%),
    radial-gradient(circle, #cfecf9 50%, transparent 51%);
  background-repeat: no-repeat;
  background-size: 10px 10px, 10px 10px, 6px 6px, 26px 26px, 7px 2px, 31px 16px, 44px 44px, 44px 44px;
  background-position: 15px 6px, 34px 6px, 22px 27px, 50% 18px, 50% 53px, 50% 31px, 50% 13px, 50% 28px;
  animation: faceLift 3s linear infinite alternate;
}
.loader::before {
  content: "";
  position: absolute;
  width: 140%; height: 78px;
  left: -20%; top: 0;
  background-image:
    radial-gradient(circle, #e8edf8 48%, transparent 50%),
    radial-gradient(circle, #e8edf8 48%, transparent 50%);
  background-repeat: no-repeat;
  background-size: 40px 40px;
  background-position: 0px 8px, 90px 8px;
  animation: earLift 3s linear infinite alternate;
}
@keyframes faceLift {
  0%   { transform: translateX(-60%) }
  100% { transform: translateX(-30%) }
}
@keyframes earLift {
  0%   { transform: translateX(10px) }
  100% { transform: translateX(0px) }
}

/* ─── BUTTONS — exact Uiverse silver, blue-tinted ─ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  outline: none;
  cursor: pointer;
  min-width: 140px;
  height: 50px;
  padding: 0 26px;
  background-image: linear-gradient(to top, #b8c8e8 0%, #dce8ff 80%, #eaf0ff 100%);
  border-radius: 30px;
  border: 1px solid #6080b0;
  transition: all 0.2s ease;
  font-family: 'Space Grotesk', "Source Sans Pro", sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #2040a0;
  text-shadow: 0 1px rgba(255,255,255,.8);
  text-decoration: none;
  letter-spacing: .01em;
}
.btn:hover {
  box-shadow:
    0 4px 3px 1px rgba(59,130,246,.25),
    0 6px 8px rgba(59,130,246,.35),
    0 -4px 4px rgba(99,160,255,.2),
    0 -6px 4px rgba(59,130,246,.1),
    inset 0 0 3px 3px rgba(59,130,246,.2);
}
.btn:active,
.btn:focus {
  box-shadow:
    0 4px 3px 1px rgba(59,130,246,.2),
    0 6px 8px rgba(59,130,246,.3),
    0 -4px 4px rgba(99,160,255,.15),
    0 -6px 4px rgba(59,130,246,.08),
    inset 0 0 5px 3px rgba(32,64,160,.5),
    inset 0 0 30px rgba(59,130,246,.25);
}
/* all variants same look */
.btn.primary { }
.btn.ghost   { }
.btn.neutral { }

/* ─── CARDS ───────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 26px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.card p + p { margin-top: 16px }
.card strong { color: #e8f0ff }
.card em { color: var(--muted); font-style: normal }

/* ─── SKILLS ──────────────────────────────────── */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.skill-cat {
  border-radius: 14px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  border-top-width: 2px;
  background: var(--surface);
}
.skill-cat-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 12px; opacity: .75;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 7px }
.chip {
  font-size: 12px; font-weight: 500;
  padding: 4px 11px; border-radius: 6px;
  border: 1px solid; white-space: nowrap;
  font-family: 'Inter', sans-serif;
  text-decoration: none;
  transition: transform .12s ease, opacity .12s;
}
.chip:hover { transform: translateY(-1px); opacity: .85 }

.cat-lang   { border-top-color: var(--c-lang) }
.cat-ai     { border-top-color: var(--c-ai) }
.cat-robot  { border-top-color: var(--c-robot) }
.cat-embed  { border-top-color: var(--c-embed) }
.cat-sim    { border-top-color: var(--c-sim) }
.cat-devops { border-top-color: var(--c-devops) }
.cat-design { border-top-color: var(--c-design) }
.cat-soft   { border-top-color: var(--c-soft) }

.cat-lang   .skill-cat-label { color: var(--c-lang) }
.cat-ai     .skill-cat-label { color: var(--c-ai) }
.cat-robot  .skill-cat-label { color: var(--c-robot) }
.cat-embed  .skill-cat-label { color: var(--c-embed) }
.cat-sim    .skill-cat-label { color: var(--c-sim) }
.cat-devops .skill-cat-label { color: var(--c-devops) }
.cat-design .skill-cat-label { color: var(--c-design) }
.cat-soft   .skill-cat-label { color: var(--c-soft) }

.cat-lang   .chip { color: var(--c-lang);   border-color: rgba(125,211,252,.22);  background: rgba(125,211,252,.06) }
.cat-ai     .chip { color: var(--c-ai);     border-color: rgba(167,139,250,.22);  background: rgba(167,139,250,.06) }
.cat-robot  .chip { color: var(--c-robot);  border-color: rgba(52,211,153,.22);   background: rgba(52,211,153,.06) }
.cat-embed  .chip { color: var(--c-embed);  border-color: rgba(251,146,60,.22);   background: rgba(251,146,60,.06) }
.cat-sim    .chip { color: var(--c-sim);    border-color: rgba(244,114,182,.22);  background: rgba(244,114,182,.06) }
.cat-devops .chip { color: var(--c-devops); border-color: rgba(96,165,250,.22);   background: rgba(96,165,250,.06) }
.cat-design .chip { color: var(--c-design); border-color: rgba(192,132,252,.22);  background: rgba(192,132,252,.06) }
.cat-soft   .chip { color: var(--c-soft);   border-color: rgba(148,163,184,.22);   background: rgba(148,163,184,.06) }

/* ─── PROJECTS ────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(1, minmax(0,1fr)); gap: 16px }
@media(min-width:700px)  { .grid { grid-template-columns: repeat(2, minmax(0,1fr)) } }
@media(min-width:980px)  { .grid { grid-template-columns: repeat(3, minmax(0,1fr)) } }
.proj {
  display: flex; flex-direction: column;
  background: #08101e; border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border); text-decoration: none; color: inherit;
  transition: border-color .2s, transform .2s;
}
.proj:hover { border-color: rgba(59,130,246,.3); transform: translateY(-2px) }
.thumbwrap { position: relative; height: 0; padding-top: 65%; background: rgba(0,0,0,.3) }
.thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover }
.thumb-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #081018, #0e1a2e);
  display: flex; align-items: center; justify-content: center;
}
.proj .caption { flex: 0 0 auto; padding: 14px 16px; min-height: 100px; border-top: 1px solid var(--border) }
.meta .title { font-size: 14px; font-weight: 600; color: #c8d8f0; margin-bottom: 4px }
.proj .desc { font-size: 12px; color: var(--muted); margin-bottom: 8px }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: rgba(59,130,246,.07); border: 1px solid rgba(59,130,246,.2); color: #4a80d0; margin-right: 4px }
#projects-grid .proj.hidden { display: none }
.center { text-align: center }

/* ─── MISC ────────────────────────────────────── */
.profile-link { color: var(--sky); font-weight: 600; text-decoration: none }
.profile-link:hover { text-decoration: underline }
footer { padding: 48px 0; color: var(--muted); text-align: center; border-top: 1px solid rgba(59,130,246,.08); font-size: 14px }

/* ─── EXPERIENCE ENTRIES ─────────────────────── */
.exp-header {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap;
}
.exp-date {
  font-size: 12px; font-weight: 600; color: var(--blue);
  background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);
  padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.exp-bullets {
  list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 6px;
}
.exp-bullets li {
  font-size: 13px; color: var(--muted); padding-left: 16px; position: relative; line-height: 1.6;
}
.exp-bullets li::before {
  content: '▸'; position: absolute; left: 0; color: var(--blue); font-size: 11px; top: 2px;
}

/* ─── CERTIFICATIONS ─────────────────────────── */
.cert-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;
  margin-bottom: 60px;
}
.cert-card {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--blue); border-radius: 12px; padding: 16px 18px;
}
.cert-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.cert-icon-badge {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 8px;
  background: rgba(59,130,246,.1);
  border: 1px solid rgba(59,130,246,.25);
  color: var(--sky);
  font-size: 11px; font-weight: 800; letter-spacing: .03em;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
}
.cert-title { font-size: 14px; font-weight: 600; color: #e8f0ff; margin-bottom: 4px; }
.cert-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
.cert-verify {
  display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 600;
  color: var(--sky); text-decoration: none;
}
.cert-verify:hover { text-decoration: underline; }

/* ─── SOFT SKILLS ────────────────────────────── */
.soft-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
  margin-bottom: 60px;
}
.soft-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 18px; text-align: center;
  transition: border-color .2s, transform .2s;
}
.soft-card:hover { border-color: rgba(59,130,246,.3); transform: translateY(-2px); }
.soft-icon { font-size: 28px; margin-bottom: 10px; }
.soft-label { font-size: 14px; font-weight: 700; color: #e8f0ff; margin-bottom: 6px; }
.soft-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ════════════════════════════════════════════════
   PROJECT DETAIL PAGE
════════════════════════════════════════════════ */

/* Back button */
.back-btn {
  font-size: 13px; font-weight: 600; color: var(--sky);
  text-decoration: none; padding: 6px 14px;
  border: 1px solid rgba(125,211,252,.25);
  border-radius: 20px; background: rgba(125,211,252,.06);
  transition: background .2s, border-color .2s;
}
.back-btn:hover { background: rgba(125,211,252,.12); border-color: rgba(125,211,252,.45); }

.linkpill {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-decoration: none; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: 20px;
  background: var(--surface);
  transition: color .2s, border-color .2s;
}
.linkpill:hover { color: var(--sky); border-color: rgba(125,211,252,.35); }

/* Hero cover image */
.p-hero {
  width: 100%; max-height: 420px; object-fit: cover;
  border-radius: 16px; margin-bottom: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 16px 48px rgba(0,0,0,.45);
}

/* Tag row */
.tagrow { display: flex; flex-wrap: wrap; gap: 8px; }

/* Project detail layout */
.project-detail { padding-top: 36px; padding-bottom: 80px; max-width: 800px; }
.project-detail h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 800; color: #e8f0ff; line-height: 1.2;
  margin-bottom: 6px;
}
.project-detail .card { margin-top: 0; }

/* Section headings inside card */
.p-section h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--sky); margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(125,211,252,.15);
}

/* Rich text content */
.project-description p { margin-bottom: 10px; line-height: 1.75; color: var(--text); }
.project-description ul { padding-left: 20px; margin-bottom: 10px; }
.project-description li { margin-bottom: 5px; line-height: 1.7; color: var(--muted); }
.project-description strong { color: #e0ecff; }
.project-description code {
  background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2);
  border-radius: 4px; padding: 1px 5px; font-size: 12px; color: var(--sky);
}

/* CAD / image grid */
.cad-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-top: 12px;
}
.cad-grid figure { margin: 0; }
.cad-grid img {
  width: 100%; border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.cad-grid figcaption {
  font-size: 11px; color: var(--muted);
  text-align: center; margin-top: 5px;
}

</style>

    .p-status {
      font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; letter-spacing:.04em;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:#ecf2ff;
    }
    .p-status.complete   { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.45);  color:#4ade80 }
    .p-status.inprogress { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.45); color:#7dd3fc }
    .p-status.draft      { background:rgba(250,204,21,.12); border-color:rgba(250,204,21,.45); color:#fde68a }

    .p-section { margin: 24px 0 }
    .p-section h3 {
      font-family:'Space Grotesk',sans-serif;
      font-size:14px; font-weight:700; color:var(--sky);
      margin-bottom:12px; padding-bottom:8px;
      border-bottom:1px solid rgba(125,211,252,.15);
    }
    .p-section img {
      width:100%; height:auto; border-radius:12px;
      margin:10px 0; border:1px solid rgba(255,255,255,.08);
    }

    /* YouTube embed */
    .yt-wrap {
      position:relative; width:100%; padding-top:56.25%;
      border-radius:14px; overflow:hidden;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 40px rgba(0,0,0,.4);
      margin-bottom:16px;
    }
    .yt-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:0 }

    /* Gallery grid */
    .gallery { display:grid; gap:10px; grid-template-columns:repeat(2,minmax(0,1fr)); margin-top:12px }
    @media(min-width:860px){ .gallery{ grid-template-columns:repeat(3,minmax(0,1fr)) } }
    .gallery img {
      width:100%; height:auto; display:block; border-radius:12px;
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04);
    }

    /* CAD grid */
    .cad-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px; margin-top:12px;
    }
    .cad-grid figure { margin:0 }
    .cad-grid img { width:100%; border-radius:10px; border:1px solid var(--border); background:var(--surface) }
    .cad-grid figcaption { font-size:11px; color:var(--muted); text-align:center; margin-top:5px }

    /* Rich text */
    .project-description p  { margin-bottom:10px; line-height:1.75; color:var(--text) }
    .project-description ul { padding-left:20px; margin-bottom:10px }
    .project-description li { margin-bottom:5px; line-height:1.7; color:var(--muted) }
    .project-description strong { color:#e0ecff }
    .project-description em    { color:var(--sky) }
    .project-description code  {
      background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2);
      border-radius:4px; padding:1px 5px; font-size:12px; color:var(--sky);
    }

    /* Detail layout */
    .project-detail { padding-top:36px; padding-bottom:80px; max-width:800px }
    .project-detail h1 {
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(22px,4vw,36px); font-weight:800;
      color:#e8f0ff; line-height:1.2; margin-bottom:6px;
    }
  </style>
</head>
