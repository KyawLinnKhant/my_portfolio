<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Kyaw Linn Khant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* ── Project-page only ── */
    .p-meta { display:flex; gap:10px; align-items:center; margin:8px 0 20px; flex-wrap:wrap }

    .p-status {
      font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; letter-spacing:.04em;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:#ecf2ff;
    }
    .p-status.complete   { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.45);  color:#4ade80 }
    .p-status.inprogress { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.45); color:#7dd3fc }
    .p-status.draft      { background:rgba(250,204,21,.12); border-color:rgba(250,204,21,.45); color:#fde68a }

    .p-section { margin: 24px 0 }
    .p-section h3 {
      font-family:'Space Grotesk',sans-serif;
      font-size:14px; font-weight:700; color:var(--sky);
      margin-bottom:12px; padding-bottom:8px;
      border-bottom:1px solid rgba(125,211,252,.15);
    }
    .p-section img {
      width:100%; height:auto; border-radius:12px;
      margin:10px 0; border:1px solid rgba(255,255,255,.08);
    }

    /* YouTube embed */
    .yt-wrap {
      position:relative; width:100%; padding-top:56.25%;
      border-radius:14px; overflow:hidden;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 40px rgba(0,0,0,.4);
      margin-bottom:16px;
    }
    .yt-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:0 }

    /* Gallery grid */
    .gallery { display:grid; gap:10px; grid-template-columns:repeat(2,minmax(0,1fr)); margin-top:12px }
    @media(min-width:860px){ .gallery{ grid-template-columns:repeat(3,minmax(0,1fr)) } }
    .gallery img {
      width:100%; height:auto; display:block; border-radius:12px;
      border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04);
    }

    /* CAD grid */
    .cad-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px; margin-top:12px;
    }
    .cad-grid figure { margin:0 }
    .cad-grid img { width:100%; border-radius:10px; border:1px solid var(--border); background:var(--surface) }
    .cad-grid figcaption { font-size:11px; color:var(--muted); text-align:center; margin-top:5px }

    /* Rich text */
    .project-description p  { margin-bottom:10px; line-height:1.75; color:var(--text) }
    .project-description ul { padding-left:20px; margin-bottom:10px }
    .project-description li { margin-bottom:5px; line-height:1.7; color:var(--muted) }
    .project-description strong { color:#e0ecff }
    .project-description em    { color:var(--sky) }
    .project-description code  {
      background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2);
      border-radius:4px; padding:1px 5px; font-size:12px; color:var(--sky);
    }

    /* Detail layout */
    .project-detail { padding-top:36px; padding-bottom:80px; max-width:800px }
    .project-detail h1 {
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(22px,4vw,36px); font-weight:800;
      color:#e8f0ff; line-height:1.2; margin-bottom:6px;
    }
  </style>
</head>
<body>

  <header class="navwrap">
    <div class="nav container">
      <a class="brand" href="index.html">Kyaw Linn Khant</a>
      <nav class="links" style="display:flex;gap:8px;align-items:center">
        <a class="back-btn" href="index.html">← Back</a>
        <a class="linkpill" href="index.html#projects">All Projects</a>
      </nav>
    </div>
  </header>

  <main class="container project-detail">
    <h1 id="p-title">Project</h1>

    <div class="p-meta">
      <div id="p-status" class="p-status" style="display:none"></div>
      <div id="p-tags" class="tagrow"></div>
    </div>

    <img id="p-img" alt="" class="p-hero" style="display:none" />

    <div class="card">
      <p id="p-desc" style="font-size:15px;line-height:1.8;color:var(--text);margin-bottom:8px"></p>
      <div id="p-sections"></div>
      <div id="p-media" class="media" style="display:none"></div>
    </div>
  </main>

  <footer>© <span id="y"></span> Kyaw Linn Khant</footer>

  <script src="projects.js"></script>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    /* ── YouTube helpers ── */
    function getYouTubeId(url){
      try{
        const u = new URL(url);
        if(u.hostname.includes('youtu.be')) return u.pathname.slice(1);
        const v = u.searchParams.get('v'); if(v) return v;
        const parts = u.pathname.split('/').filter(Boolean);
        const iS = parts.indexOf('shorts'); if(iS>=0&&parts[iS+1]) return parts[iS+1];
        const iE = parts.indexOf('embed');  if(iE>=0&&parts[iE+1])  return parts[iE+1];
        return null;
      }catch{ return null; }
    }
    function makeYT(id){
      const d = document.createElement('div');
      d.className = 'yt-wrap';
      d.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1"
        title="YouTube video" allow="accelerometer;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
        allowfullscreen loading="lazy"></iframe>`;
      return d;
    }

    /* ── Populate page ── */
    const id = new URLSearchParams(location.search).get('id');
    const p  = (window.PROJECTS||{})[id];

    if(p){
      document.title = (p.title||'Project') + ' — Kyaw Linn Khant';
      document.getElementById('p-title').textContent = p.title||'Project';

      if(p.status){
        const st = document.getElementById('p-status');
        st.textContent = p.status; st.style.display = 'inline-block';
        const k = p.status.trim().toLowerCase();
        if(k.includes('complete')) st.classList.add('complete');
        else if(k.includes('progress')) st.classList.add('inprogress');
        else if(k.includes('draft')||k.includes('wip')) st.classList.add('draft');
      }

      const tagsEl = document.getElementById('p-tags');
      (p.tags||[]).forEach(t=>{
        const s = document.createElement('span');
        s.className='badge'; s.textContent=t; tagsEl.appendChild(s);
      });

      if(p.cover||p.img){
        const img = document.getElementById('p-img');
        img.src = p.cover||p.img; img.alt = p.title||''; img.style.display='block';
      }

      document.getElementById('p-desc').textContent = p.desc||'';

      const wrap = document.getElementById('p-sections');
      (p.sections||[]).forEach(sec=>{
        const d = document.createElement('div');
        d.className = 'p-section';

        if(sec.heading){ const h=document.createElement('h3'); h.textContent=sec.heading; d.appendChild(h); }

        const vids = sec.video ? [sec.video] : (Array.isArray(sec.videos)?sec.videos:[]);

        const addVid = url=>{
          const vid = getYouTubeId(url);
          if(vid){ const w=makeYT(vid); d.appendChild(w); }
          else {
            const i=document.createElement('iframe');
            Object.assign(i,{src:url,width:'100%',height:'400',frameBorder:'0',allowFullscreen:true,loading:'lazy'});
            i.style.marginBottom='16px'; d.appendChild(i);
          }
        };

        if(vids.length){
          vids.forEach(addVid);
          if(sec.content){ const c=document.createElement('div'); c.className='project-description'; c.innerHTML=sec.content; d.appendChild(c); }
          if(sec.img){ const im=document.createElement('img'); im.src=sec.img; im.alt=sec.heading||''; d.appendChild(im); }
        } else {
          if(sec.content){ const c=document.createElement('div'); c.className='project-description'; c.innerHTML=sec.content; d.appendChild(c); }
          if(sec.img){ const im=document.createElement('img'); im.src=sec.img; im.alt=sec.heading||''; d.appendChild(im); }
        }

        wrap.appendChild(d);
      });

      if(p.media&&(p.media.youtube||(p.media.images&&p.media.images.length))){
        const mediaEl = document.getElementById('p-media');
        mediaEl.style.display='block';
        const h=document.createElement('h3'); h.textContent='Media'; mediaEl.appendChild(h);
        if(p.media.youtube){ const vid=getYouTubeId(p.media.youtube); if(vid) mediaEl.appendChild(makeYT(vid)); }
        if(Array.isArray(p.media.images)&&p.media.images.length){
          const g=document.createElement('div'); g.className='gallery';
          p.media.images.forEach(src=>{ const im=document.createElement('img'); im.loading='lazy'; im.src=src; im.alt=p.title||''; g.appendChild(im); });
          mediaEl.appendChild(g);
        }
      }
    }
  </script>
</body>
</html>
