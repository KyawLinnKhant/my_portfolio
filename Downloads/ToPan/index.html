<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sol-gold: #FFD700;
            --sol-dark: #1a1a2e;
            --sol-deeper: #0f0f1e;
            --sol-light: #f5f5f0;
            --her-color: #ff6b9d;
            --your-color: #4ecdc4;
            --accent: #ffa500;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: var(--sol-deeper);
            color: var(--sol-light);
            overflow-x: hidden;
        }

        /* Animated background */
        .background-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1a1a2e 0%, #0f0f1e 100%);
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Login Screen */
        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid var(--sol-gold);
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 80px rgba(255, 215, 0, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sol-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .sol-logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 4em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sol-gold) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .sol-logo p {
            font-size: 1.1em;
            color: var(--sol-gold);
            opacity: 0.8;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .login-form {
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--sol-gold);
            font-size: 0.95em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-family: 'Crimson Pro', serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--sol-gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--sol-gold) 0%, var(--accent) 100%);
            border: none;
            border-radius: 10px;
            color: var(--sol-deeper);
            font-size: 1.2em;
            font-weight: 600;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 30px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 20px;
            font-size: 0.95em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        /* Chat Interface */
        .chat-container {
            display: none;
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .chat-container.active {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--sol-gold);
            border-radius: 15px 15px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-title h2 {
            font-family: 'Space Mono', monospace;
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--sol-gold) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .user-badge.her {
            background: rgba(255, 107, 157, 0.2);
            color: var(--her-color);
            border: 1px solid var(--her-color);
        }

        .user-badge.you {
            background: rgba(78, 205, 196, 0.2);
            color: var(--your-color);
            border: 1px solid var(--your-color);
        }

        .logout-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: var(--sol-gold);
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--sol-gold);
        }

        .messages-area {
            flex: 1;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--sol-gold);
            border-right: 1px solid var(--sol-gold);
            padding: 30px;
            overflow-y: auto;
            min-height: 500px;
            max-height: calc(100vh - 300px);
        }

        .message {
            margin-bottom: 25px;
            animation: messageSlideIn 0.4s ease-out;
            max-width: 75%;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.her-message {
            margin-right: auto;
        }

        .message.your-message {
            margin-left: auto;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.85em;
            opacity: 0.7;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .her-message .message-bubble {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2) 0%, rgba(255, 107, 157, 0.1) 100%);
            border: 1px solid var(--her-color);
            border-radius: 15px 15px 15px 0;
        }

        .your-message .message-bubble {
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.2) 0%, rgba(78, 205, 196, 0.1) 100%);
            border: 1px solid var(--your-color);
            border-radius: 15px 15px 0 15px;
        }

        .message-time {
            font-size: 0.85em;
            opacity: 0.5;
            margin-top: 5px;
            text-align: right;
        }

        .message-media {
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .message-media img,
        .message-media video {
            max-width: 100%;
            border-radius: 10px;
        }

        .message-media audio {
            width: 100%;
            margin-top: 10px;
        }

        /* Input Area */
        .input-area {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--sol-gold);
            border-radius: 0 0 15px 15px;
            padding: 20px 30px;
        }

        .input-area.readonly {
            opacity: 0.6;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-size: 1.05em;
            font-family: 'Crimson Pro', serif;
            resize: none;
            max-height: 120px;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--sol-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .message-input:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .input-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--sol-gold);
            background: rgba(255, 215, 0, 0.1);
            color: var(--sol-gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.1);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--sol-gold) 0%, var(--accent) 100%);
            color: var(--sol-deeper);
            border: none;
            font-weight: 700;
        }

        .send-btn:hover {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .file-input {
            display: none;
        }

        .attachment-preview {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--sol-gold);
            border-radius: 10px;
            display: none;
        }

        .attachment-preview.show {
            display: block;
        }

        .attachment-preview img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
        }

        .remove-attachment {
            margin-left: 10px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 2em;
            margin-bottom: 10px;
            color: var(--sol-gold);
        }

        /* Voice Recording */
        .recording-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 107, 157, 0.2);
            border-radius: 10px;
            margin-top: 15px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-box {
                padding: 40px 30px;
            }

            .sol-logo h1 {
                font-size: 3em;
            }

            .message {
                max-width: 85%;
            }

            .chat-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--sol-gold);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-stars" id="stars"></div>

    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="sol-logo">
                <h1>SOL</h1>
                <p>Our Universe</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="password">Enter Your Sky</label>
                    <input type="password" id="password" placeholder="Password" autocomplete="off">
                </div>
                <button type="submit" class="login-btn">Enter</button>
                <div class="error-message" id="errorMsg">Invalid password. Try again.</div>
            </form>
        </div>
    </div>

    <!-- Chat Interface -->
    <div class="chat-container" id="chatScreen">
        <div class="chat-header">
            <div class="chat-title">
                <h2>SOL</h2>
                <span class="user-badge" id="userBadge"></span>
            </div>
            <button class="logout-btn" id="logoutBtn">Exit</button>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="empty-state">
                <h3>✨</h3>
                <p>Your constellation awaits...</p>
            </div>
        </div>

        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <textarea 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>
                <div class="input-controls">
                    <button class="control-btn" id="attachBtn" title="Attach media">
                        📎
                    </button>
                    <button class="control-btn" id="voiceBtn" title="Record voice">
                        🎤
                    </button>
                    <button class="control-btn send-btn" id="sendBtn">
                        ➤
                    </button>
                </div>
            </div>
            <input type="file" class="file-input" id="fileInput" accept="image/*,video/*,audio/*">
            <div class="attachment-preview" id="attachmentPreview"></div>
            <div class="recording-indicator" id="recordingIndicator">
                <div class="recording-dot"></div>
                <span>Recording... <span id="recordingTime">0:00</span></span>
            </div>
        </div>
    </div>

    <script>
        // ⚙️ CONFIGURATION
        const PASSWORDS = {
            her: '3o3Pan',  // Change this to her password
            you: 'KLK'  // Change this to your password
        };

        // App State
        let currentUser = null;
        let messages = [];
        let attachedFile = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStartTime = null;
        let recordingInterval = null;

        // DOM Elements
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentPreview = document.getElementById('attachmentPreview');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const recordingTime = document.getElementById('recordingTime');
        const userBadge = document.getElementById('userBadge');
        const logoutBtn = document.getElementById('logoutBtn');
        const inputArea = document.getElementById('inputArea');

        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Load messages from localStorage
        function loadMessages() {
            const saved = localStorage.getItem('sol_messages');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            }
        }

        // Save messages to localStorage
        function saveMessages() {
            localStorage.setItem('sol_messages', JSON.stringify(messages));
        }

        // Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = passwordInput.value;

            if (password === PASSWORDS.her) {
                currentUser = 'her';
                showChat();
            } else if (password === PASSWORDS.you) {
                currentUser = 'you';
                showChat();
            } else {
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                passwordInput.value = '';
            }
        });

        // Show chat interface
        function showChat() {
            loginScreen.style.display = 'none';
            chatScreen.classList.add('active');
            
            userBadge.className = `user-badge ${currentUser}`;
            userBadge.textContent = currentUser === 'her' ? 'Pan' : 'Youß';

            // If you're on "your side", make input read-only initially
            if (currentUser === 'you') {
                // You can only reply, so we'll enable it when there are messages
                updateInputState();
            }

            loadMessages();
            scrollToBottom();
        }

        // Update input state based on user and messages
        function updateInputState() {
            if (currentUser === 'you') {
                // Your side: can only reply if there are her messages
                const hasHerMessages = messages.some(m => m.sender === 'her');
                if (!hasHerMessages && messages.length === 0) {
                    inputArea.classList.add('readonly');
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    attachBtn.disabled = true;
                    voiceBtn.disabled = true;
                    messageInput.placeholder = "Waiting for her message...";
                } else {
                    inputArea.classList.remove('readonly');
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    attachBtn.disabled = false;
                    voiceBtn.disabled = false;
                    messageInput.placeholder = "Type your reply...";
                }
            }
        }

        // Render messages
        function renderMessages() {
            if (messages.length === 0) {
                messagesArea.innerHTML = `
                    <div class="empty-state">
                        <h3>✨</h3>
                        <p>Your constellation awaits...</p>
                    </div>
                `;
                return;
            }

            messagesArea.innerHTML = messages.map(msg => {
                const isHer = msg.sender === 'her';
                const messageClass = isHer ? 'her-message' : 'your-message';
                const senderName = isHer ? 'Her' : 'You';
                
                let mediaHtml = '';
                if (msg.media) {
                    if (msg.media.type === 'image') {
                        mediaHtml = `<div class="message-media"><img src="${msg.media.data}" alt="Image"></div>`;
                    } else if (msg.media.type === 'video') {
                        mediaHtml = `<div class="message-media"><video controls src="${msg.media.data}"></video></div>`;
                    } else if (msg.media.type === 'audio') {
                        mediaHtml = `<div class="message-media"><audio controls src="${msg.media.data}"></audio></div>`;
                    }
                }

                return `
                    <div class="message ${messageClass}">
                        <div class="message-header">
                            <strong>${senderName}</strong>
                        </div>
                        <div class="message-bubble">
                            ${msg.text}
                            ${mediaHtml}
                            <div class="message-time">${msg.time}</div>
                        </div>
                    </div>
                `;
            }).join('');

            updateInputState();
            scrollToBottom();
        }

        // Send message
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !attachedFile) return;

            const message = {
                sender: currentUser,
                text: text,
                time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
                media: attachedFile
            };

            messages.push(message);
            saveMessages();
            renderMessages();

            messageInput.value = '';
            attachedFile = null;
            attachmentPreview.classList.remove('show');
            messageInput.style.height = 'auto';
        }

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        // Enter to send (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // File attachment
        attachBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                let mediaType = 'image';
                if (file.type.startsWith('video/')) mediaType = 'video';
                if (file.type.startsWith('audio/')) mediaType = 'audio';

                attachedFile = {
                    type: mediaType,
                    data: event.target.result
                };

                // Show preview
                let previewHtml = `
                    <strong>Attached: ${file.name}</strong>
                    <span class="remove-attachment" onclick="removeAttachment()">✕ Remove</span>
                `;

                if (mediaType === 'image') {
                    previewHtml += `<br><img src="${event.target.result}" alt="Preview">`;
                }

                attachmentPreview.innerHTML = previewHtml;
                attachmentPreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        });

        function removeAttachment() {
            attachedFile = null;
            attachmentPreview.classList.remove('show');
            fileInput.value = '';
        }

        // Voice recording
        voiceBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                // Start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            attachedFile = {
                                type: 'audio',
                                data: event.target.result
                            };
                            attachmentPreview.innerHTML = `
                                <strong>Voice message recorded</strong>
                                <span class="remove-attachment" onclick="removeAttachment()">✕ Remove</span>
                                <br><audio controls src="${event.target.result}"></audio>
                            `;
                            attachmentPreview.classList.add('show');
                        };
                        reader.readAsDataURL(audioBlob);

                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    recordingIndicator.classList.add('active');
                    voiceBtn.textContent = '⏹️';
                    recordingStartTime = Date.now();
                    
                    recordingInterval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                        const mins = Math.floor(elapsed / 60);
                        const secs = elapsed % 60;
                        recordingTime.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    }, 1000);

                } catch (err) {
                    alert('Microphone access denied');
                }
            } else {
                // Stop recording
                mediaRecorder.stop();
                recordingIndicator.classList.remove('active');
                voiceBtn.textContent = '🎤';
                clearInterval(recordingInterval);
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            currentUser = null;
            chatScreen.classList.remove('active');
            loginScreen.style.display = 'flex';
            passwordInput.value = '';
        });

        // Scroll to bottom
        function scrollToBottom() {
            setTimeout(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 100);
        }

        // Initialize
        loadMessages();
    </script>
</body>
</html>
